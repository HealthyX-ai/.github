name: Feature Request
description: Suggest a new feature or enhancement
title: "[FEATURE] "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Open an issue before writing code. Describe the problem first — the solution second.
        **Do not include PHI, patient data, or credentials in this request.**

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      placeholder: As a [user type], I need to [goal] because [reason]...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Nice to have
        - Important
        - Urgent — blocking work
    validations:
      required: true

  - type: checkboxes
    id: phi_check
    attributes:
      label: Compliance confirmation
      options:
        - label: This request contains no PHI, patient data, or credentials.
          required: true

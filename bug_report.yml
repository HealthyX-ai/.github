name: Bug Report
description: Report a bug or unexpected behavior
title: "[BUG] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        **Before filing:** Check known issues in the repo's `docs/SUPPORT.md` first.
        **Do not include PHI, patient data, or credentials in this report.**

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options: [POC, TST, SUP, PROD]
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - P1 — Critical (PROD down or data integrity at risk)
        - P2 — High (major feature broken, no workaround)
        - P3 — Medium (degraded, workaround exists)
        - P4 — Low (minor or cosmetic)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the unexpected behavior. No PHI.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to...
        2. Click...
        3. See error...
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots or logs (scrubbed of sensitive data).

  - type: checkboxes
    id: phi_check
    attributes:
      label: Compliance confirmation
      options:
        - label: This report contains no PHI, patient data, or credentials.
          required: true
